name: lain5g-lab-app

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lain5g-lab-app-backend
    working_dir: ${LAIN5G_PROJECT_ROOT:?Set LAIN5G_PROJECT_ROOT in .env.app}
    environment:
      LAIN5G_PROJECT_ROOT: ${LAIN5G_PROJECT_ROOT:?Set LAIN5G_PROJECT_ROOT in .env.app}
      LAIN5G_SCENARIO: ${LAIN5G_SCENARIO:-5g-sa}
      LAIN5G_DRY_RUN: ${LAIN5G_DRY_RUN:-false}
      LAIN5G_COMMAND_TIMEOUT: ${LAIN5G_COMMAND_TIMEOUT:-300}
      LAIN5G_LOG_TAIL_LINES: ${LAIN5G_LOG_TAIL_LINES:-500}
      LAIN5G_MAX_OUTPUT_CHARS: ${LAIN5G_MAX_OUTPUT_CHARS:-20000}
      LAIN5G_CORS_ORIGINS: ${LAIN5G_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      PYTHONPATH: ${LAIN5G_PROJECT_ROOT:?Set LAIN5G_PROJECT_ROOT in .env.app}
    volumes:
      - ${LAIN5G_PROJECT_ROOT:?Set LAIN5G_PROJECT_ROOT in .env.app}:${LAIN5G_PROJECT_ROOT:?Set LAIN5G_PROJECT_ROOT in .env.app}
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${APP_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lain5g-lab-app-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app

networks:
  app:
    name: lain5g-lab-app
