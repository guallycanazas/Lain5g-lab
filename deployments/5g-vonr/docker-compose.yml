name: lain5g-lab-5g-vonr-sim

services:
  mongo:
    image: mongo:7.0
    container_name: lain5g-lab-5g-vonr-sim-mongo
    command: ["mongod", "--bind_ip_all"]
    volumes: ["mongo-data:/data/db"]
    networks: { core: { ipv4_address: 10.50.0.2 } }
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  subscriber-provisioner:
    image: mongo:7.0
    container_name: lain5g-lab-5g-vonr-sim-subscriber-provisioner
    env_file: [.env]
    depends_on:
      mongo: { condition: service_healthy }
    volumes: ["./provisioning/open5gs-subscriber-init.js:/subscriber-init.js:ro"]
    command: ["mongosh", "mongodb://mongo:27017/open5gs", "/subscriber-init.js"]
    networks: { core: { ipv4_address: 10.50.0.3 } }
    restart: "no"

  nrf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-nrf
    command: ["open5gs-nrfd", "-c", "/etc/open5gs/nrf.yaml"]
    depends_on:
      subscriber-provisioner: { condition: service_completed_successfully }
    volumes: ["./open5gs/nrf.yaml:/etc/open5gs/nrf.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.10 } }

  ausf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-ausf
    command: ["open5gs-ausfd", "-c", "/etc/open5gs/ausf.yaml"]
    depends_on: [nrf]
    volumes: ["./open5gs/ausf.yaml:/etc/open5gs/ausf.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.6 } }

  udm:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-udm
    command: ["open5gs-udmd", "-c", "/etc/open5gs/udm.yaml"]
    depends_on: [nrf]
    volumes: ["./open5gs/udm.yaml:/etc/open5gs/udm.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.8 } }

  udr:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-udr
    command: ["open5gs-udrd", "-c", "/etc/open5gs/udr.yaml"]
    depends_on: [nrf]
    volumes: ["./open5gs/udr.yaml:/etc/open5gs/udr.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.9 } }

  pcf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-pcf
    command: ["open5gs-pcfd", "-c", "/etc/open5gs/pcf.yaml"]
    depends_on: [nrf]
    volumes: ["./open5gs/pcf.yaml:/etc/open5gs/pcf.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.11 } }

  upf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-upf
    environment:
      UE_SUBNET: ${UE_INTERNET_SUBNET:-10.60.0.0/16}
      UE_GATEWAY: 10.60.0.1
      UE_IMS_SUBNET: ${UE_IMS_SUBNET:-10.61.0.0/16}
      UE_IMS_GATEWAY: 10.61.0.1
    command: ["open5gs-upfd", "-c", "/etc/open5gs/upf.yaml"]
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.ip_forward: "1"
    depends_on: [nrf]
    volumes: ["./open5gs/upf.yaml:/etc/open5gs/upf.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.7 } }

  smf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-smf
    command: ["open5gs-smfd", "-c", "/etc/open5gs/smf.yaml"]
    depends_on: [nrf, upf]
    volumes: ["./open5gs/smf.yaml:/etc/open5gs/smf.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.4 } }

  amf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-vonr-sim-amf
    command: ["open5gs-amfd", "-c", "/etc/open5gs/amf.yaml"]
    depends_on: [nrf, ausf, udm, udr, pcf, smf]
    volumes: ["./open5gs/amf.yaml:/etc/open5gs/amf.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.5 } }

  gnb:
    image: lain5g-lab/ueransim:local
    container_name: lain5g-lab-5g-vonr-sim-gnb
    command: ["nr-gnb", "-c", "/etc/ueransim/gnb.yaml"]
    depends_on: [amf]
    volumes: ["./ueransim/gnb.yaml:/etc/ueransim/gnb.yaml:ro"]
    networks: { core: { ipv4_address: 10.50.0.40 } }

  ue:
    image: lain5g-lab/ueransim:local
    container_name: lain5g-lab-5g-vonr-sim-ue
    env_file: [.env]
    command:
      - sh
      - -lc
      - |
        mkdir -p /tmp/ueransim
        sed -e "s/__SUBSCRIBER_IMSI__/$${SUBSCRIBER_IMSI}/g" \
            -e "s/__SUBSCRIBER_KEY__/$${SUBSCRIBER_KEY}/g" \
            -e "s/__SUBSCRIBER_OPC__/$${SUBSCRIBER_OPC}/g" \
            -e "s/__SUBSCRIBER_AMF__/$${SUBSCRIBER_AMF}/g" \
            -e "s/__SUBSCRIBER_SQN__/$${SUBSCRIBER_SQN}/g" \
            /etc/ueransim/ue-ims.yaml > /tmp/ueransim/ue.yaml
        exec nr-ue -c /tmp/ueransim/ue.yaml
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [gnb]
    volumes:
      - ./ueransim/ue-internet.yaml:/etc/ueransim/ue-internet.yaml:ro
      - ./ueransim/ue-ims.yaml:/etc/ueransim/ue-ims.yaml:ro
    networks: { core: { ipv4_address: 10.50.0.41 } }

  ims-database:
    image: mariadb:11
    container_name: lain5g-lab-5g-vonr-sim-ims-database
    environment: { MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes", MARIADB_DATABASE: ims }
    volumes: ["./ims/database/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro"]
    networks: { core: { ipv4_address: 10.50.0.19 } }

  pcscf:
    image: lain5g-lab/kamailio:local
    container_name: lain5g-lab-5g-vonr-sim-pcscf
    command: ["-DD", "-E", "-f", "/etc/kamailio/kamailio.cfg"]
    volumes: ["./ims/pcscf/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro"]
    networks: { core: { ipv4_address: 10.50.0.20 } }

  icscf:
    image: lain5g-lab/kamailio:local
    container_name: lain5g-lab-5g-vonr-sim-icscf
    command: ["-DD", "-E", "-f", "/etc/kamailio/kamailio.cfg"]
    volumes: ["./ims/icscf/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro"]
    networks: { core: { ipv4_address: 10.50.0.22 } }

  scscf:
    image: lain5g-lab/ims-sip:local
    container_name: lain5g-lab-5g-vonr-sim-scscf
    command: ["scscf_server.py"]
    env_file: [.env]
    environment:
      SCSCF_BIND_IP: 10.50.0.23
    depends_on:
      ims-provisioner: { condition: service_completed_successfully }
    networks: { core: { ipv4_address: 10.50.0.23 } }

  dns:
    image: lain5g-lab/ims-dns:local
    container_name: lain5g-lab-5g-vonr-sim-dns
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./ims/dns/Corefile:/etc/coredns/Corefile:ro
      - ./ims/dns/ims.hosts:/etc/coredns/ims.hosts:ro
    networks: { core: { ipv4_address: 10.50.0.30 } }

  ims-provisioner:
    image: mariadb:11
    container_name: lain5g-lab-5g-vonr-sim-ims-provisioner
    env_file: [.env]
    depends_on: [ims-database]
    volumes: ["./provisioning/ims-subscriber-init.sql:/ims-subscriber-init.sql:ro"]
    command:
      - sh
      - -lc
      - |
        until mariadb --skip-ssl -h ims-database -uroot ims -e 'SELECT 1' >/dev/null 2>&1; do sleep 1; done
        sed -e "s/__SUBSCRIBER_IMSI__/$${SUBSCRIBER_IMSI}/g" \
            -e "s/__SUBSCRIBER_MSISDN__/$${SUBSCRIBER_MSISDN}/g" \
            -e "s/__IMS_DOMAIN__/$${IMS_DOMAIN}/g" \
            -e "s/__IMS_AUTH_PASSWORD__/$${IMS_AUTH_PASSWORD}/g" \
            /ims-subscriber-init.sql | mariadb --skip-ssl -h ims-database -uroot ims
    networks: { core: { ipv4_address: 10.50.0.31 } }
    restart: "no"

  sip-register:
    image: lain5g-lab/ims-sip:local
    container_name: lain5g-lab-5g-vonr-sim-sip-register
    profiles: ["sip"]
    command: ["sip_register_client.py"]
    env_file: [.env]
    environment:
      SIP_DNS_SERVER: 10.50.0.30
      SIP_EXPECTED_IMS_IP: 10.50.0.20
      SIP_EXPECTED_PCSCF_IP: 10.50.0.20
      SIP_EXPECTED_ICSCF_IP: 10.50.0.22
      SIP_EXPECTED_SCSCF_IP: 10.50.0.23
    network_mode: "service:ue"
    depends_on: [ue, dns, pcscf, icscf, scscf]
    restart: "no"

networks:
  core:
    name: lain5g-lab-5g-vonr-sim-core
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/24

volumes:
  mongo-data:
    name: lain5g-lab-5g-vonr-sim-mongo-data
