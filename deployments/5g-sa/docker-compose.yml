name: lain5g-lab-5g-sa

services:
  mongo:
    image: mongo:7.0
    container_name: lain5g-lab-5g-sa-mongo
    command: ["mongod", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    networks:
      core:
        ipv4_address: 10.20.0.2
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  init-subscriber:
    image: mongo:7.0
    container_name: lain5g-lab-5g-sa-init-subscriber
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./mongo/subscriber-init.js:/docker-entrypoint-initdb.d/subscriber-init.js:ro
    command:
      - mongosh
      - mongodb://mongo:27017/open5gs
      - /docker-entrypoint-initdb.d/subscriber-init.js
    networks:
      core:
        ipv4_address: 10.20.0.3
    restart: "no"

  nrf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-nrf
    command:
      - open5gs-nrfd
      - -c
      - /etc/open5gs/nrf.yaml
    depends_on:
      init-subscriber:
        condition: service_completed_successfully
    volumes:
      - ./open5gs/nrf.yaml:/etc/open5gs/nrf.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.10

  ausf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-ausf
    command:
      - open5gs-ausfd
      - -c
      - /etc/open5gs/ausf.yaml
    depends_on:
      - nrf
    volumes:
      - ./open5gs/ausf.yaml:/etc/open5gs/ausf.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.6

  udm:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-udm
    command:
      - open5gs-udmd
      - -c
      - /etc/open5gs/udm.yaml
    depends_on:
      - nrf
    volumes:
      - ./open5gs/udm.yaml:/etc/open5gs/udm.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.8

  udr:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-udr
    command:
      - open5gs-udrd
      - -c
      - /etc/open5gs/udr.yaml
    depends_on:
      - nrf
    volumes:
      - ./open5gs/udr.yaml:/etc/open5gs/udr.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.9

  pcf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-pcf
    command:
      - open5gs-pcfd
      - -c
      - /etc/open5gs/pcf.yaml
    depends_on:
      - nrf
    volumes:
      - ./open5gs/pcf.yaml:/etc/open5gs/pcf.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.11

  upf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-upf
    environment:
      UE_SUBNET: ${UE_SUBNET:-10.45.0.0/16}
      UE_GATEWAY: ${UE_GATEWAY:-10.45.0.1}
    command:
      - open5gs-upfd
      - -c
      - /etc/open5gs/upf.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    depends_on:
      - nrf
    volumes:
      - ./open5gs/upf.yaml:/etc/open5gs/upf.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.7

  smf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-smf
    command:
      - open5gs-smfd
      - -c
      - /etc/open5gs/smf.yaml
    depends_on:
      - nrf
      - upf
    volumes:
      - ./open5gs/smf.yaml:/etc/open5gs/smf.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.4

  amf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-5g-sa-amf
    command:
      - open5gs-amfd
      - -c
      - /etc/open5gs/amf.yaml
    depends_on:
      - nrf
      - ausf
      - udm
      - udr
      - pcf
      - smf
    volumes:
      - ./open5gs/amf.yaml:/etc/open5gs/amf.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.5

  gnb:
    image: lain5g-lab/ueransim:local
    container_name: lain5g-lab-5g-sa-gnb
    command:
      - nr-gnb
      - -c
      - /etc/ueransim/gnb.yaml
    depends_on:
      - amf
    volumes:
      - ./ueransim/gnb.yaml:/etc/ueransim/gnb.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.20

  ue:
    image: lain5g-lab/ueransim:local
    container_name: lain5g-lab-5g-sa-ue
    command:
      - nr-ue
      - -c
      - /etc/ueransim/ue.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - gnb
    volumes:
      - ./ueransim/ue.yaml:/etc/ueransim/ue.yaml:ro
    networks:
      core:
        ipv4_address: 10.20.0.21

networks:
  core:
    name: lain5g-lab-5g-sa-core
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24

volumes:
  mongo-data:
    name: lain5g-lab-5g-sa-mongo-data
