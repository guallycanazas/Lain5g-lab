#!KAMAILIO
debug=2
log_stderror=yes
listen=udp:10.42.0.20:5060
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "pv.so"
loadmodule "textops.so"
loadmodule "xlog.so"
route {
  if (is_method("REGISTER")) {
    xlog("L_INFO", "P-CSCF_FORWARD_REGISTER\n");
    $du = "sip:10.42.0.21:5060";
    if (!t_relay()) {
      sl_reply_error();
    }
    exit;
  }
  sl_send_reply("200", "Lain5G-Lab P-CSCF alive");
}
