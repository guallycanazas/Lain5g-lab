name: lain5g-lab-4g-lte-sim

services:
  mongo:
    image: mongo:7.0
    container_name: lain5g-lab-4g-lte-sim-mongo
    command: ["mongod", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    networks: { epc: { ipv4_address: 10.43.0.2 } }
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  subscriber-provisioner:
    image: mongo:7.0
    container_name: lain5g-lab-4g-lte-sim-subscriber-provisioner
    env_file: [../4g-volte/common/.env]
    depends_on:
      mongo: { condition: service_healthy }
    volumes:
      - ./provisioning/open5gs-subscriber-init.js:/subscriber-init.js:ro
    command: ["mongosh", "mongodb://mongo:27017/open5gs", "/subscriber-init.js"]
    networks: { epc: { ipv4_address: 10.43.0.3 } }
    restart: "no"

  mme:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-mme
    command: ["open5gs-mmed", "-c", "/etc/open5gs/mme.yaml"]
    environment:
      FD_LISTEN_ON: 10.43.0.10
      FD_HSS_CONNECT_TO: 10.43.0.11
    depends_on: [hss, sgwc]
    volumes: ["./open5gs/mme.yaml:/etc/open5gs/mme.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.10 } }

  hss:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-hss
    command: ["open5gs-hssd", "-c", "/etc/open5gs/hss.yaml"]
    environment:
      FD_LISTEN_ON: 10.43.0.11
      FD_MME_CONNECT_TO: 10.43.0.10
    depends_on:
      subscriber-provisioner: { condition: service_completed_successfully }
    volumes: ["./open5gs/hss.yaml:/etc/open5gs/hss.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.11 } }

  sgwc:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-sgwc
    command: ["open5gs-sgwcd", "-c", "/etc/open5gs/sgwc.yaml"]
    volumes: ["./open5gs/sgwc.yaml:/etc/open5gs/sgwc.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.12 } }

  sgwu:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-sgwu
    command: ["open5gs-sgwud", "-c", "/etc/open5gs/sgwu.yaml"]
    volumes: ["./open5gs/sgwu.yaml:/etc/open5gs/sgwu.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.13 } }

  pgwc:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-pgwc
    command: ["open5gs-smfd", "-c", "/etc/open5gs/pgwc.yaml"]
    environment:
      FD_LISTEN_ON: 10.43.0.14
      FD_PCRF_CONNECT_TO: 10.43.0.16
    volumes: ["./open5gs/pgwc.yaml:/etc/open5gs/pgwc.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.14 } }

  pgwu:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-pgwu
    command: ["open5gs-upfd", "-c", "/etc/open5gs/pgwu.yaml"]
    environment:
      UE_SUBNET: 10.57.0.0/16
      UE_GATEWAY: 10.57.0.1
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    volumes: ["./open5gs/pgwu.yaml:/etc/open5gs/pgwu.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.15 } }

  pcrf:
    image: lain5g-lab/open5gs:local
    container_name: lain5g-lab-4g-lte-sim-pcrf
    command: ["open5gs-pcrfd", "-c", "/etc/open5gs/pcrf.yaml"]
    environment:
      FD_LISTEN_ON: 10.43.0.16
      FD_SMF_CONNECT_TO: 10.43.0.14
    depends_on:
      mongo: { condition: service_healthy }
    volumes: ["./open5gs/pcrf.yaml:/etc/open5gs/pcrf.yaml:ro"]
    networks: { epc: { ipv4_address: 10.43.0.16 } }

  enb:
    image: lain5g-lab/srsran4g-sim:local
    container_name: lain5g-lab-4g-lte-sim-enb
    command: ["srsenb", "/etc/srsran/enb.conf", "--enb_files.rr_config=/etc/srsran/rr.conf", "--enb_files.sib_config=/etc/srsran/sib.conf", "--enb_files.rb_config=/etc/srsran/rb.conf"]
    depends_on: [mme]
    volumes:
      - ./ran/enb.conf:/etc/srsran/enb.conf:ro
      - ../4g-volte/sim/ran/rr.conf:/etc/srsran/rr.conf:ro
      - ../4g-volte/sim/ran/sib.conf:/etc/srsran/sib.conf:ro
      - ../4g-volte/sim/ran/rb.conf:/etc/srsran/rb.conf:ro
    networks: { epc: { ipv4_address: 10.43.0.40 } }

  ue:
    image: lain5g-lab/srsran4g-sim:local
    container_name: lain5g-lab-4g-lte-sim-ue
    command: ["srsue", "/etc/srsran/ue.conf"]
    env_file: [../4g-volte/common/.env]
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [enb]
    volumes: ["./ran/ue.conf:/etc/srsran/ue.conf:ro"]
    networks: { epc: { ipv4_address: 10.43.0.41 } }

networks:
  epc:
    name: lain5g-lab-4g-lte-sim-core
    driver: bridge
    ipam:
      config:
        - subnet: 10.43.0.0/24

volumes:
  mongo-data:
    name: lain5g-lab-4g-lte-sim-mongo-data
